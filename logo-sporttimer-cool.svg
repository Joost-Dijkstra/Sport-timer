<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Sporttimer Cool Logo</title>
  <desc id="desc">Logo based on the Sporttimer icon with wordmark</desc>

  <defs>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2c6d"/>
      <stop offset="55%" stop-color="#0d1638"/>
      <stop offset="100%" stop-color="#35140d"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#68d2ff"/>
      <stop offset="55%" stop-color="#f1f7ff"/>
      <stop offset="100%" stop-color="#ff9d42"/>
    </linearGradient>
    <clipPath id="iconClip">
      <circle cx="180" cy="180" r="120"/>
    </clipPath>
  </defs>

  <rect x="20" y="44" width="1160" height="272" rx="48" fill="url(#bgGlow)" opacity="0.95"/>
  <circle cx="180" cy="180" r="126" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="4"/>
  <circle cx="180" cy="180" r="116" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="16"/>
  <image href="icon%20sporttimer.png" x="60" y="60" width="240" height="240" clip-path="url(#iconClip)" preserveAspectRatio="xMidYMid slice"/>

  <text x="340" y="166" fill="url(#titleGrad)" style="font-family: 'Orbitron', 'Segoe UI', sans-serif; font-weight: 800; font-size: 94px; letter-spacing: 0.08em;">
    SPORTTIMER
  </text>
  <text x="344" y="230" fill="#9fbedb" style="font-family: 'Exo 2', 'Segoe UI', sans-serif; font-weight: 700; font-size: 40px; letter-spacing: 0.35em;">
    COOL EDITION
  </text>
</svg>
